name: fx-signal

on:
  # 本番の定期実行は VPS(さくら) の system cron に確定。GitHub Actions のスケジュール
  # 起動は二重起動(Slack二重通知＋state分裂)になるため停止する。手動テストのみ残す。
  # （VPSへ移れない/暫定で Actions を使う場合だけ、以下の schedule を有効化する）
  # schedule:
  #   - cron: "*/5 * * * 1-5"
  #   - cron: "*/5 21-23 * * 0"
  workflow_dispatch: {}   # 手動テスト用（本番はVPS cron）

# 実行の重複を防ぐ（前の実行が走っていてもキャンセルせず待たせない）
concurrency:
  group: fx-signal
  cancel-in-progress: false

permissions:
  contents: write   # state.json を commit & push するために必要

jobs:
  monitor:
    # macOS は無料枠を10倍消費するため必ず ubuntu-latest を使う
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # リスク層用。未設定でも本体は動く（リスク層だけスキップ）。
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fx_signal.py

      - name: Commit state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ペアごとの状態ファイル（state_USDJPY.json 等）とデータ健全性ファイルを対象に
          git add -A state_*.json 2>/dev/null || true
          git add -A data_health.json 2>/dev/null || true
          # 監査ログ(risk_log.jsonl)も commit 対象にするかは下のフラグで選べる。
          # パブリックリポジトリなのでログに機密を入れないこと（入力イベント名と
          # 出力JSONのみ。APIキーや個人情報は記録しない設計）。
          if [ "${COMMIT_RISK_LOG:-true}" = "true" ] && [ -f risk_log.jsonl ]; then
            git add risk_log.jsonl
          fi
          # ゲート抑制ログ(gate_log.jsonl)も同様にフラグで選べる（機密は記録しない）。
          if [ "${COMMIT_GATE_LOG:-true}" = "true" ] && [ -f gate_log.jsonl ]; then
            git add gate_log.jsonl
          fi
          # 差分が無い時は commit しない
          if git diff --cached --quiet; then
            echo "差分なし — commit をスキップします。"
          else
            git commit -m "chore: update state [skip ci]"
            # 直列実行でも稀に他の実行が先にpushして弾かれる(non-fast-forward)ことが
            # あるため、push前に rebase で取り込む。--autostash で未コミット差分も退避。
            git pull --rebase --autostash origin main || true
            git push
          fi
        env:
          # risk_log.jsonl を commit するなら "true"、しないなら "false"
          COMMIT_RISK_LOG: "true"
