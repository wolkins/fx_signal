name: fx-signal

on:
  schedule:
    # FX市場は土日クローズなので、開いている時間帯だけ5分おきに実行する。
    # cron は UTC 基準。GitHub Actions の cron は混雑時に遅延することがある。
    #   月〜金（UTC終日）= 取引時間の大部分をカバー
    - cron: "*/5 * * * 1-5"
    #   日曜21:00(UTC)以降 = 月曜早朝(JST)の週明けオープン分
    - cron: "*/5 21-23 * * 0"
    # ※ 土曜(UTC)と日曜の日中(UTC)は市場クローズのため実行しない。
    #   端境や祝日は fx_signal.py 側の STALE_MINUTES ガードでも二重に弾く。
  workflow_dispatch: {}   # 手動テスト用

# 実行の重複を防ぐ（前の実行が走っていてもキャンセルせず待たせない）
concurrency:
  group: fx-signal
  cancel-in-progress: false

permissions:
  contents: write   # state.json を commit & push するために必要

jobs:
  monitor:
    # macOS は無料枠を10倍消費するため必ず ubuntu-latest を使う
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python fx_signal.py

      - name: Commit state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          # 差分が無い時は commit しない
          if git diff --cached --quiet; then
            echo "state.json に変化なし — commit をスキップします。"
          else
            git commit -m "chore: update state.json [skip ci]"
            git push
          fi
