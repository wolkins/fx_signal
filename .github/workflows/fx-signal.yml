name: fx-signal

on:
  schedule:
    # FX市場は土日クローズなので、開いている時間帯だけ5分おきに実行する。
    # cron は UTC 基準。GitHub Actions の cron は混雑時に遅延することがある。
    #   月〜金（UTC終日）= 取引時間の大部分をカバー
    - cron: "*/5 * * * 1-5"
    #   日曜21:00(UTC)以降 = 月曜早朝(JST)の週明けオープン分
    - cron: "*/5 21-23 * * 0"
    # ※ 土曜(UTC)と日曜の日中(UTC)は市場クローズのため実行しない。
    #   端境や祝日は fx_signal.py 側の STALE_MINUTES ガードでも二重に弾く。
  workflow_dispatch: {}   # 手動テスト用

# 実行の重複を防ぐ（前の実行が走っていてもキャンセルせず待たせない）
concurrency:
  group: fx-signal
  cancel-in-progress: false

permissions:
  contents: write   # state.json を commit & push するために必要

jobs:
  monitor:
    # macOS は無料枠を10倍消費するため必ず ubuntu-latest を使う
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # リスク層用。未設定でも本体は動く（リスク層だけスキップ）。
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fx_signal.py

      - name: Commit state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ペアごとの状態ファイル（state_USDJPY.json 等）をまとめて対象にする
          git add -A state_*.json 2>/dev/null || true
          # 監査ログ(risk_log.jsonl)も commit 対象にするかは下のフラグで選べる。
          # パブリックリポジトリなのでログに機密を入れないこと（入力イベント名と
          # 出力JSONのみ。APIキーや個人情報は記録しない設計）。
          if [ "${COMMIT_RISK_LOG:-true}" = "true" ] && [ -f risk_log.jsonl ]; then
            git add risk_log.jsonl
          fi
          # 差分が無い時は commit しない
          if git diff --cached --quiet; then
            echo "差分なし — commit をスキップします。"
          else
            git commit -m "chore: update state [skip ci]"
            git push
          fi
        env:
          # risk_log.jsonl を commit するなら "true"、しないなら "false"
          COMMIT_RISK_LOG: "true"
